name: "Zici Demo"
description: "Junior high Chinese vocabulary learning — grade browse, AI explain, review, quiz, stats"
viewport:
  width: 1440
  height: 900

effects:
  deviceFrame:
    enabled: true
    type: browser
    darkMode: false
  background:
    type: gradient
    value: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
    padding: 48
    borderRadius: 14
    shadow: true
  zoom:
    enabled: true
    intensity: light
    easing: spring
    autoZoom:
      followCursor: true
  cursor:
    enabled: true
    size: 20
    speed: "normal"
    clickEffect: true
    trail: true
  speedRamp:
    enabled: true
    idleSpeed: 2.0
    actionSpeed: 0.8

output:
  format: mp4
  fps: 30
  preset: balanced

audio:
  file: ../artifacts/narration-synced.mp3
  volume: 1.0
  fadeIn: 0.5
  fadeOut: 1.5

steps:
  - name: "Login"
    captureDelay: 150
    holdDuration: 2500
    transition: fade
    actions:
      - action: navigate
        url: "http://localhost:3000/login"
        waitUntil: load
      - action: waitForSelector
        selector: "input[type='email']"
        state: visible
        timeout: 5000
      - action: click
        selector: "input[type='email']"
      - action: type
        selector: "input[type='email']"
        text: "demo@zici.app"
        delay: 80
      - action: click
        selector: "input[type='password']"
      - action: type
        selector: "input[type='password']"
        text: "demo1234"
        delay: 80
      - action: click
        selector: "form button[type='submit']"
      - action: waitForURL
        url: "http://localhost:3000/"
        timeout: 10000

  - name: "Home — Grade Index"
    captureDelay: 150
    holdDuration: 2500
    transition: fade
    actions:
      - action: navigate
        url: "http://localhost:3000/"
        waitUntil: load
      - action: scroll
        x: 0
        y: 350
      - action: scroll
        x: 0
        y: -350

  - name: "Grade 7 Word List"
    captureDelay: 120
    holdDuration: 1500
    transition: fade
    actions:
      - action: navigate
        url: "http://localhost:3000/grade/7-1"
        waitUntil: load
      - action: click
        selector: "button:has-text('分歧')"

  - name: "AI Explanation"
    captureDelay: 120
    holdDuration: 3000
    transition: none
    actions:
      - action: click
        selector: "button:has-text('✨ AI 解释')"
      - action: smartWait
        until: networkIdle
        timeout: 12000
        displaySpeed: 3

  - name: "Spaced Repetition Review"
    captureDelay: 120
    holdDuration: 1200
    transition: fade
    actions:
      - action: navigate
        url: "http://localhost:3000/review"
        waitUntil: load
      - action: click
        selector: "text=点击翻转"
      - action: waitForSelector
        selector: "text=✓ 记住了"
        state: visible
        timeout: 5000
      - action: click
        selector: "text=✓ 记住了"
      - action: waitForSelector
        selector: "text=点击翻转"
        state: visible
        timeout: 5000
      - action: click
        selector: "text=点击翻转"
      - action: waitForSelector
        selector: "text=✗ 没记住"
        state: visible
        timeout: 5000
      - action: click
        selector: "text=✗ 没记住"

  - name: "Pinyin Quiz"
    captureDelay: 120
    holdDuration: 1200
    transition: fade
    actions:
      - action: navigate
        url: "http://localhost:3000/quiz"
        waitUntil: load
      - action: waitForSelector
        selector: "main button"
        state: visible
        timeout: 5000
      - action: click
        selector: "main button:nth-of-type(2)"
      - action: waitForSelector
        selector: "main button"
        state: visible
        timeout: 5000
      - action: click
        selector: "main button:nth-of-type(1)"
      - action: waitForSelector
        selector: "main button"
        state: visible
        timeout: 5000
      - action: click
        selector: "main button:nth-of-type(3)"

  - name: "Learning Statistics"
    captureDelay: 150
    holdDuration: 3000
    transition: fade
    actions:
      - action: navigate
        url: "http://localhost:3000/stats"
        waitUntil: load
      - action: scroll
        x: 0
        y: 400
      - action: scroll
        x: 0
        y: 400
